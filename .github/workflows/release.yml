name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Install MinHook
        run: |
          $url = "https://github.com/TsudaKageyu/minhook/releases/download/v1.3.4/MinHook_134_lib.zip"
          Invoke-WebRequest -Uri $url -OutFile minhook.zip
          Expand-Archive -Path minhook.zip -DestinationPath minhook_lib
          New-Item -ItemType Directory -Path deps/minhook/include -Force
          New-Item -ItemType Directory -Path deps/minhook/lib -Force
          Copy-Item minhook_lib/include/MinHook.h deps/minhook/include/
          Copy-Item minhook_lib/lib/libMinHook.x86.lib deps/minhook/lib/
        shell: pwsh
      -
        name: Install miniz
        run: |
          $url = "https://github.com/richgel999/miniz/releases/download/3.1.1/miniz-3.1.1.zip"
          Invoke-WebRequest -Uri $url -OutFile miniz.zip
          Expand-Archive -Path miniz.zip -DestinationPath miniz_src
          New-Item -ItemType Directory -Path deps/miniz -Force
          Copy-Item miniz_src/miniz.h deps/miniz/
          Copy-Item miniz_src/miniz.c deps/miniz/
        shell: pwsh
      -
        name: Configure
        run: cmake -A Win32 -B build
      -
        name: Build
        run: cmake --build build --config Release
      -
        name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/version.dll